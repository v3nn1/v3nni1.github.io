<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#06050a">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <title>Veera Arvola — 2D Game Art</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0a12;
            --bg-deep: #06050a;
            --bg-soft: #14101c;
            --neon-pink: #ff52c2;
            --neon-cyan: #00e5ff;
            --neon-purple: #a855f7;
            --warm-amber: #fbbf24;
            --warm-pink: #f472b6;
            --cozy-cream: #fef3c7;
            --neon-pink-glow: rgba(255, 82, 194, 0.5);
            --neon-cyan-glow: rgba(0, 229, 255, 0.45);
            --neon-purple-glow: rgba(168, 85, 247, 0.4);
            --warm-glow: rgba(251, 191, 36, 0.25);
            --text: #e9e5f0;
            --text-dim: #9ca3af;
            --glow-weak: 8px;
            --glow-mid: 20px;
            --glow-strong: 40px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .gallery-item, .hero .back-link, .lightbox-close, .lightbox-nav {
            touch-action: manipulation;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* Cozy retro + synthwave background: horizon gradient + grid + scanlines */
        .grid-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: 
                /* Top: deep space purple */
                linear-gradient(180deg, 
                    #0f0a18 0%, 
                    #1a0f2e 18%,
                    #2d1b4e 35%,
                    #3b2463 45%,
                    /* Horizon: warm sunset band */
                    rgba(251, 191, 36, 0.12) 50%,
                    rgba(244, 114, 182, 0.15) 55%,
                    #1f1729 65%,
                    #120d18 78%,
                    var(--bg-deep) 100%);
        }

        .grid-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 48px 48px;
            animation: grid-drift 25s linear infinite;
        }

        .grid-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
            pointer-events: none;
        }

        @keyframes grid-drift {
            0% { transform: translateY(0); }
            100% { transform: translateY(48px); }
        }

        /* Hero */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-image {
            position: absolute;
            inset: 0;
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(180deg, 
                    rgba(12, 10, 18, 0.3) 0%, 
                    transparent 35%,
                    rgba(12, 10, 18, 0.5) 65%, 
                    var(--bg-deep) 100%),
                radial-gradient(ellipse 80% 50% at 50% 100%, transparent 40%, rgba(0, 0, 0, 0.6) 100%);
        }

        /* Neon frame corners on hero */
        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2.5rem;
        }

        .hero-content::before {
            content: '';
            position: absolute;
            inset: 15%;
            border: 1px solid rgba(0, 229, 255, 0.25);
            pointer-events: none;
            box-shadow: 
                inset 0 0 60px rgba(0, 229, 255, 0.06),
                inset 0 0 100px rgba(244, 114, 182, 0.04),
                0 0 60px rgba(0, 229, 255, 0.1);
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 6vw, 3.75rem);
            font-weight: 800;
            color: var(--cozy-cream);
            text-shadow: 
                0 0 8px var(--neon-pink-glow),
                0 0 20px var(--neon-pink-glow),
                0 0 40px rgba(255, 82, 194, 0.4),
                0 0 60px rgba(251, 191, 36, 0.15),
                0 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.18em;
            margin-bottom: 0.5rem;
        }

        .hero .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.95rem, 2.5vw, 1.35rem);
            font-weight: 600;
            color: var(--neon-cyan);
            text-shadow: 
                0 0 var(--glow-weak) var(--neon-cyan-glow),
                0 0 var(--glow-mid) var(--neon-cyan-glow),
                0 0 var(--glow-strong) rgba(0, 229, 255, 0.2);
            letter-spacing: 0.45em;
        }

        .hero .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            margin-top: 2.5rem;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-decoration: none;
            letter-spacing: 0.2em;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            transition: color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        .hero .back-link:hover {
            color: var(--warm-amber);
            border-color: var(--warm-amber);
            box-shadow: 0 0 16px var(--warm-glow);
        }

        /* Section titles: retro label style */
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.1rem, 2.8vw, 1.5rem);
            font-weight: 600;
            color: var(--neon-cyan);
            text-shadow: 
                0 0 var(--glow-weak) var(--neon-cyan-glow),
                0 0 var(--glow-mid) rgba(0, 229, 255, 0.25);
            letter-spacing: 0.25em;
            margin-bottom: 2rem;
            padding: 0.6rem 1rem;
            border-left: 4px solid var(--neon-cyan);
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.06) 0%, transparent 100%);
            display: inline-block;
        }

        /* Featured: cozy card depth + neon border */
        .featured {
            padding: 4rem 1.5rem 3rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .featured-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.75rem;
        }

        .featured .gallery-item {
            aspect-ratio: 4/3;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(0, 229, 255, 0.25);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                0 4px 20px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(168, 85, 247, 0.1);
            transition: transform 0.25s ease, box-shadow 0.3s, border-color 0.3s;
        }

        .featured .gallery-item:hover {
            transform: translateY(-4px);
            border-color: var(--neon-cyan);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.08),
                0 8px 32px rgba(0, 0, 0, 0.5),
                0 0 var(--glow-mid) var(--neon-cyan-glow),
                0 0 var(--glow-strong) rgba(0, 229, 255, 0.15);
        }

        .featured .gallery-item img,
        .featured .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* More work: warm purple glow + rounded corners */
        .more-work {
            padding: 2rem 1.5rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .more-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        .more-work .gallery-item {
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(168, 85, 247, 0.2);
            background: rgba(0, 0, 0, 0.25);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.04),
                0 4px 16px rgba(0, 0, 0, 0.35);
            transition: transform 0.25s ease, box-shadow 0.3s, border-color 0.3s;
        }

        .more-work .gallery-item:hover {
            transform: translateY(-3px) scale(1.02);
            border-color: var(--warm-pink);
            box-shadow: 
                inset 0 1px 0 rgba(255, 255, 255, 0.06),
                0 8px 28px rgba(0, 0, 0, 0.45),
                0 0 var(--glow-mid) var(--neon-purple-glow),
                0 0 var(--glow-strong) rgba(244, 114, 182, 0.2);
        }

        .more-work .gallery-item img,
        .more-work .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Footer: warm gradient line */
        footer {
            padding: 2.5rem 1.5rem;
            border-top: 1px solid rgba(0, 229, 255, 0.2);
            text-align: center;
            background: linear-gradient(180deg, transparent 0%, rgba(12, 10, 18, 0.5) 100%);
            position: relative;
        }

        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 60%;
            height: 1px;
            transform: translateX(-50%);
            background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--warm-pink), transparent);
            opacity: 0.6;
        }

        footer a {
            color: var(--neon-cyan);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            transition: text-shadow 0.3s, color 0.3s;
        }

        footer a:hover {
            color: var(--warm-amber);
            text-shadow: 0 0 12px var(--warm-glow);
        }

        footer p {
            margin-top: 0.75rem;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .lightbox-media-container {
            position: relative;
        }

        .lightbox-content img,
        .lightbox-content video,
        .lightbox-content iframe {
            max-width: 100%;
            max-height: 80vh;
            display: block;
            object-fit: contain;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 30px var(--neon-cyan-glow);
        }

        .lightbox-content iframe {
            width: 100%;
            max-width: min(854px, 90vw);
            height: 480px;
            min-width: 280px;
            min-height: 180px;
            max-height: 90vh;
        }

        .lightbox-close {
            position: absolute;
            top: -40px;
            right: 0;
            min-width: 44px;
            min-height: 44px;
            width: 44px;
            height: 44px;
            background: rgba(0, 0, 0, 0.6);
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: box-shadow 0.3s;
        }

        .lightbox-close:hover {
            box-shadow: 0 0 15px var(--neon-cyan-glow);
        }

        .lightbox-description {
            margin-top: 12px;
            padding: 10px 0;
            color: var(--text-dim);
            font-size: 0.85rem;
            max-width: 100%;
        }

        .lightbox-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--neon-cyan);
            font-size: 1rem;
            display: none;
        }

        .lightbox-loading.active {
            display: block;
        }

        .lightbox-loading::after {
            content: '...';
            animation: loading-dots 1.5s steps(4, end) infinite;
        }

        @keyframes loading-dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            background: rgba(0, 255, 247, 0.1);
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            font-size: 1.5em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: box-shadow 0.3s;
        }

        .lightbox-nav:hover {
            box-shadow: 0 0 20px var(--neon-cyan-glow);
        }

        .lightbox-nav.prev { left: -60px; }
        .lightbox-nav.next { right: -60px; }

        @media (max-width: 768px) {
            .featured-grid {
                grid-template-columns: 1fr;
            }

            .more-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 10px;
            }

            .lightbox-content iframe {
                width: 100%;
                max-width: 100%;
                height: 50vw;
                min-height: 200px;
                max-height: 60vh;
            }

            .lightbox-nav.prev { left: 5px; }
            .lightbox-nav.next { right: 5px; }
            .lightbox-close { top: -44px; right: 0; min-width: 44px; min-height: 44px; width: 44px; height: 44px; }
        }

        @media (max-width: 480px) {
            .hero-content { padding: 1.5rem 1rem; }
            .hero-content::before { inset: 8%; }
            .more-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 8px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .grid-bg::before { animation: none; }
            .featured .gallery-item:hover,
            .more-work .gallery-item:hover { transform: none; }
        }

        .skip-link {
            position: absolute;
            left: -9999px;
            top: 0.5rem;
            z-index: 9999;
            padding: 0.5rem 1rem;
            background: var(--bg-soft);
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .skip-link:focus {
            left: max(1rem, env(safe-area-inset-left));
            outline: 2px solid var(--neon-cyan);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div class="grid-bg"></div>

    <header class="hero">
        <div class="hero-image">
            <img src="/images/2d/Astarion.webp" alt="Digital fan art of Astarion from Baldur's Gate 3 — 2D portfolio hero">
        </div>
        <div class="hero-content">
            <h1>VEERA ARVOLA</h1>
            <p class="subtitle">2D GAME ARTIST</p>
            <a href="/" class="back-link">← FULL PORTFOLIO</a>
        </div>
    </header>

    <main id="main-content" class="portfolio-gallery">
        <section class="featured">
            <h2 class="section-title">FEATURED</h2>
            <div class="featured-grid">
                <div class="gallery-item">
                    <img src="/videos/2d/LIVE2D_gif.gif" 
                         alt="2D character rigged and animated (Procreate, Affinity Photo & Live2D Cubism)" 
                         data-video="/videos/2d/LIVE2D.mp4"
                         data-loop="true"
                         data-description="2D character rigged and animated (Procreate, Affinity Photo & Live2D Cubism)"
                         loading="lazy" decoding="async">
                </div>
                <div class="gallery-item">
                    <img src="/images/2d/baking_succcess_overview_thumbnail.webp" 
                         alt="2D art assets: cutscene art, gameplay, UI (Pencil & Photoshop)" 
                         data-full-image="/images/2d/baking_succcess_overview.webp"
                         data-description="2D art assets ranging from cutscene art and gameplay to UI elements (Pencil & Photoshop)"
                         loading="lazy" decoding="async">
                </div>
                <div class="gallery-item">
                    <img src="/images/2d/CF_character_concept_thumbnail.webp" 
                         alt="2D medieval character concepts (Pencil & Photoshop)" 
                         data-full-image="/images/2d/CF_character_concept.webp"
                         data-description="2D medieval character concepts (Pencil & Photoshop)"
                         loading="lazy" decoding="async">
                </div>
                <div class="gallery-item">
                    <img src="/videos/2d/world_map_gif.gif" 
                         alt="2D frame animated world map (Pencil & Photoshop)" 
                         data-video="/videos/2d/world_map.mp4"
                         data-loop="true"
                         data-description="2D frame animated world map (Pencil & Photoshop)"
                         loading="lazy" decoding="async">
                </div>
            </div>
        </section>

        <section class="more-work">
            <h2 class="section-title">MORE WORK</h2>
            <div class="more-grid">
                <div class="gallery-item">
                    <img src="/images/2d/Giger.webp" alt="Digital painting inspired by H.R. Giger (Pencil & Photoshop)" loading="lazy" decoding="async">
                </div>
                <div class="gallery-item">
                    <img src="/images/2d/TFTP_title_01_animated.gif" alt="Animated title screen (Procreate & Photoshop)" loading="lazy" decoding="async">
                </div>
                <div class="gallery-item">
                    <img src="/images/2d/Rippers.webp" alt="Concept art (Pencil & Photoshop)" loading="lazy" decoding="async">
                </div>
                <div class="gallery-item">
                    <img src="/images/2d/Rippers_2.webp" alt="Concept art (Pencil & Photoshop)" loading="lazy" decoding="async">
                </div>
                <div class="gallery-item">
                    <img src="/images/2d/Make_it_so.webp" alt="Oil painting" loading="lazy" decoding="async">
                </div>
                <div class="gallery-item">
                    <img src="/videos/2d/waking_up_gif.gif" 
                         alt="2D cutscene snippet compilation (Procreate, Photoshop & Unity)" 
                         data-youtube="https://youtu.be/iMxSd7ppROc"
                         data-description="2D cutscene snippet compilation (Procreate, Photoshop & Unity)"
                         loading="lazy" decoding="async">
                </div>
                <div class="gallery-item">
                    <img src="/videos/2d/gross_cellar_gif.gif" 
                         alt="2D animated background (Photoshop & Unity)" 
                         data-video="/videos/2d/gross_cellar.mp4"
                         data-loop="true"
                         data-description="2D animated background (Photoshop & Unity)"
                         loading="lazy" decoding="async">
                </div>
                <div class="gallery-item">
                    <img src="/videos/2d/youtube_HAOjQEE00BI_gif.gif" 
                         alt="Speedpainting (Photoshop)" 
                         data-youtube="https://youtu.be/HAOjQEE00BI"
                         data-description="Speedpainting of my lovely husband and our late hound Igor (Photoshop)"
                         loading="lazy" decoding="async">
                </div>
                <div class="gallery-item">
                    <img src="/images/2d/logos_thumbnail.webp" 
                         alt="Logo designs (Photoshop)" 
                         data-full-image="/images/2d/logos.webp"
                         data-description="Some logo designs (Photoshop)"
                         loading="lazy" decoding="async">
                </div>
                <div class="gallery-item">
                    <img src="/images/2d/fight_club_thumbnail.webp" 
                         alt="Oil painting" 
                         data-full-image="/images/2d/fight_club.webp"
                         data-description="Oil painting"
                         loading="lazy" decoding="async">
                </div>
            </div>
        </section>
    </main>

    <footer>
        <a href="/">← Back to full portfolio</a>
        <p>Character design · Concept art · Digital painting · 2D animation · UI/UX</p>
    </footer>

    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image gallery">
        <div class="lightbox-content">
            <div class="lightbox-media-container">
                <button class="lightbox-close" aria-label="Close">×</button>
                <div class="lightbox-loading" id="lightbox-loading">Loading</div>
                <img src="" alt="" id="lightbox-img" style="display: none;">
                <video controls style="display: none;" id="lightbox-video"></video>
                <iframe src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="display: none;" id="lightbox-iframe"></iframe>
            </div>
            <div class="lightbox-description" id="lightbox-desc"></div>
            <button class="lightbox-nav prev" aria-label="Previous">‹</button>
            <button class="lightbox-nav next" aria-label="Next">›</button>
        </div>
    </div>

    <script>
        (function() {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxVideo = document.getElementById('lightbox-video');
            const lightboxIframe = document.getElementById('lightbox-iframe');
            const lightboxDesc = document.getElementById('lightbox-desc');
            const lightboxLoading = document.getElementById('lightbox-loading');

            let items = [];
            let currentIndex = 0;
            let lastLightboxTrigger = null;

            function getItems() {
                return Array.from(document.querySelectorAll('.portfolio-gallery .gallery-item img'));
            }

            function stopYouTube(iframe) {
                if (!iframe || !iframe.src) return;
                if (iframe.src.includes('youtube.com/embed/')) iframe.src = '';
            }

            function showItem(index) {
                if (items.length === 0 || index < 0 || index >= items.length) return;
                currentIndex = index;
                const img = items[currentIndex];

                if (lightboxVideo.style.display !== 'none') { lightboxVideo.pause(); lightboxVideo.src = ''; }
                if (lightboxIframe.style.display !== 'none') { stopYouTube(lightboxIframe); lightboxIframe.src = ''; }

                const yt = img.getAttribute('data-youtube');
                const vid = img.getAttribute('data-video');

                if (yt) {
                    lightboxImg.style.display = 'none';
                    lightboxVideo.style.display = 'none';
                    lightboxIframe.style.display = 'block';
                    let id = '';
                    if (yt.includes('youtu.be/')) id = yt.split('youtu.be/')[1].split('?')[0];
                    else if (yt.includes('v=')) id = yt.split('v=')[1].split('&')[0];
                    lightboxIframe.src = id ? 'https://www.youtube.com/embed/' + id + '?rel=0&modestbranding=1' : '';
                    lightboxDesc.textContent = img.getAttribute('data-description') || img.alt || '';
                } else if (vid) {
                    lightboxImg.style.display = 'none';
                    lightboxIframe.style.display = 'none';
                    lightboxVideo.style.display = 'block';
                    lightboxVideo.loop = img.getAttribute('data-loop') === 'true';
                    lightboxVideo.src = vid;
                    lightboxVideo.play().catch(function() {});
                    lightboxDesc.textContent = img.getAttribute('data-description') || img.alt || '';
                    lightboxLoading.classList.remove('active');
                } else {
                    lightboxVideo.style.display = 'none';
                    lightboxIframe.style.display = 'none';
                    const src = img.getAttribute('data-full-image') || img.src;
                    lightboxLoading.classList.add('active');
                    lightboxImg.style.display = 'none';
                    lightboxImg.src = src;
                    lightboxImg.alt = img.alt || '';
                    lightboxDesc.textContent = img.getAttribute('data-description') || img.alt || '';
                    const preload = new Image();
                    preload.onload = preload.onerror = function() {
                        lightboxImg.style.display = 'block';
                        lightboxLoading.classList.remove('active');
                    };
                    preload.src = src;
                }

                document.querySelector('.lightbox-nav.prev').style.display = items.length > 1 ? 'flex' : 'none';
                document.querySelector('.lightbox-nav.next').style.display = items.length > 1 ? 'flex' : 'none';
            }

            function openLightbox(imgEl, triggerEl) {
                items = getItems();
                const i = items.indexOf(imgEl);
                if (i === -1) return;
                lastLightboxTrigger = triggerEl || imgEl.closest('.gallery-item');
                lightbox.classList.add('active');
                showItem(i);
                document.querySelector('.lightbox-close').focus();
            }

            function closeLightbox() {
                lightbox.classList.remove('active');
                if (lightboxVideo.style.display !== 'none') { lightboxVideo.pause(); lightboxVideo.src = ''; }
                if (lightboxIframe.style.display !== 'none') { lightboxIframe.src = ''; }
                if (lastLightboxTrigger && typeof lastLightboxTrigger.focus === 'function') {
                    lastLightboxTrigger.focus();
                }
                lastLightboxTrigger = null;
            }

            document.querySelectorAll('.portfolio-gallery .gallery-item img').forEach(function(img) {
                img.addEventListener('click', function(e) {
                    e.preventDefault();
                    openLightbox(img, img.closest('.gallery-item'));
                });
            });

            document.querySelectorAll('.portfolio-gallery .gallery-item').forEach(function(item) {
                var img = item.querySelector('img');
                item.setAttribute('role', 'button');
                item.setAttribute('tabindex', '0');
                item.setAttribute('aria-label', (img && img.alt) ? img.alt : 'View image');
                item.addEventListener('keydown', function(e) {
                    if (e.key !== 'Enter' && e.key !== ' ') return;
                    e.preventDefault();
                    if (img) openLightbox(img, item);
                });
            });

            document.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', function(e) { if (e.target === lightbox) closeLightbox(); });

            document.querySelector('.lightbox-nav.next').addEventListener('click', function(e) {
                e.stopPropagation();
                if (items.length > 1) showItem((currentIndex + 1) % items.length);
            });
            document.querySelector('.lightbox-nav.prev').addEventListener('click', function(e) {
                e.stopPropagation();
                if (items.length > 1) showItem((currentIndex - 1 + items.length) % items.length);
            });

            document.addEventListener('keydown', function(e) {
                if (!lightbox.classList.contains('active')) return;
                if (e.key === 'Escape') { closeLightbox(); return; }
                if (e.key === 'ArrowRight') { document.querySelector('.lightbox-nav.next').click(); return; }
                if (e.key === 'ArrowLeft') { document.querySelector('.lightbox-nav.prev').click(); return; }
                if (e.key === 'Tab') {
                    var focusable = lightbox.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
                    var first = focusable[0], last = focusable[focusable.length - 1];
                    if (e.shiftKey) {
                        if (document.activeElement === first) { e.preventDefault(); if (last) last.focus(); }
                    } else {
                        if (document.activeElement === last) { e.preventDefault(); if (first) first.focus(); }
                    }
                }
            });
        })();
    </script>
</body>
</html>
